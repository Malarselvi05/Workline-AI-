# infra/litellm_config.yaml
# LiteLLM proxy configuration for on-prem mode.
# Serves as a drop-in OpenAI-compatible endpoint pointing at local Ollama.
#
# Start with: litellm --config infra/litellm_config.yaml
# (optional — WorkLine AI's planner.py talks directly to Ollama in onprem mode)

model_list:
  - model_name: workline-llm
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: "${OLLAMA_BASE_URL:-http://localhost:11434}"

  # Larger model variant — uncomment if hardware allows (needs ~8 GB RAM)
  # - model_name: workline-llm-large
  #   litellm_params:
  #     model: ollama/llama3.1:8b
  #     api_base: "${OLLAMA_BASE_URL:-http://localhost:11434}"

litellm_settings:
  drop_params: true    # ignore unsupported OpenAI params
  set_verbose: false

router_settings:
  routing_strategy: simple-shuffle

environment_variables:
  OLLAMA_BASE_URL: "http://localhost:11434"
